# 服务配置
server:
  host: "0.0.0.0"
  port: 8000
  debug: true

# Chroma 配置
chroma:
  persist_dir: "./data/chroma"
  host: null
  port: null

# Provider 配置
providers:
  embedding:
    default: ollama-bge
    instances:
      - name: ollama-bge
        type: ollama
        base_url: "http://localhost:11434"
        model: "bge-m3"
        dimension: 1024

      - name: ollama-nomic
        type: ollama
        base_url: "http://localhost:11434"
        model: "nomic-embed-text"
        dimension: 768

  rerank:
    default: flashrank-tiny
    instances:
      - name: flashrank-tiny
        type: flashrank
        model: "ms-marco-TinyBERT-L-2-v2"

      - name: flashrank-mini
        type: flashrank
        model: "ms-marco-MiniLM-L-12-v2"

      - name: flashrank-multi
        type: flashrank
        model: "ms-marco-MultiBERT-L-12"

  llm:
    default: ollama-qwen
    instances:
      - name: ollama-qwen
        type: ollama
        base_url: "http://localhost:11434"
        model: "qwen2.5:7b"

# 索引配置
indexer:
  chunk_size: 500
  chunk_overlap: 50
  max_file_size: 1048576
  file_types:
    - ".py"
    - ".ts"
    - ".js"
    - ".md"
    - ".vue"
  exclude_dirs:
    - "node_modules"
    - ".git"
    - "__pycache__"
    - "venv"
    - ".venv"
    - "dist"
    - "build"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/app.log"