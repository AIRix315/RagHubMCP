chroma:
  host: null
  persist_dir: ./data/chroma
  port: null
indexer:
  chunk_overlap: 50
  chunk_size: 500
  exclude_dirs:
  - node_modules
  - .git
  - __pycache__
  - venv
  - .venv
  - dist
  - build
  file_types:
  - .py
  - .ts
  - .js
  - .md
  - .vue
  max_file_size: 1048576
logging:
  file: ./logs/app.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
providers:
  embedding:
    default: ollama-bge
    instances:
    # Ollama local embedding providers
    - base_url: http://localhost:11434
      dimension: 1024
      model: bge-m3
      name: ollama-bge
      type: ollama
    - base_url: http://localhost:11434
      dimension: 768
      model: nomic-embed-text
      name: ollama-nomic
      type: ollama
    # HTTP embedding providers (OpenAI-compatible APIs)
    # Uncomment and configure as needed:
    # - name: lmstudio-local
    #   type: http
    #   base_url: http://localhost:1234/v1
    #   model: nomic-embed-text
    #   dimension: 768
    # - name: openai-small
    #   type: http
    #   base_url: https://api.openai.com/v1
    #   model: text-embedding-3-small
    #   dimension: 1536
    #   api_key: ${OPENAI_API_KEY}
    # - name: azure-openai
    #   type: http
    #   base_url: https://your-resource.openai.azure.com/openai/deployments/your-deployment
    #   model: text-embedding-ada-002
    #   dimension: 1536
    #   api_key: ${AZURE_OPENAI_KEY}
    #   headers:
    #     api-key: ${AZURE_OPENAI_KEY}
  llm:
    default: ollama-qwen
    instances:
    - base_url: http://localhost:11434
      model: qwen2.5:7b
      name: ollama-qwen
      type: ollama
  rerank:
    default: flashrank-tiny
    instances:
    - model: ms-marco-TinyBERT-L-2-v2
      name: flashrank-tiny
      type: flashrank
    - model: ms-marco-MiniLM-L-12-v2
      name: flashrank-mini
      type: flashrank
    - model: ms-marco-MultiBERT-L-12
      name: flashrank-multi
      type: flashrank
server:
  debug: true
  host: 0.0.0.0
  port: 8000
