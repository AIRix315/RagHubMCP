chroma:
  host: null
  persist_dir: ./data/chroma
  port: null
cors:
  allow_credentials: true
  allow_headers:
  - '*'
  allow_methods:
  - '*'
  origins:
  - http://localhost:3315
  - http://127.0.0.1:3315
hybrid:
  alpha: 0.5
  beta: 0.5
  bm25_persist_dir: ./data/bm25
  rrf_k: 60
indexer:
  allowed_roots: []
  chunk_overlap: 50
  chunk_size: 500
  exclude_dirs:
  - node_modules
  - .git
  - __pycache__
  - venv
  - .venv
  - dist
  - build
  file_types:
  - .py
  - .ts
  - .js
  - .md
  - .vue
  max_file_size: 1048576
logging:
  file: ./logs/app.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
providers:
  embedding:
    default: ollama-bge
    instances:
    - base_url: http://localhost:11434
      dimension: 1024
      model: bge-m3
      name: ollama-bge
      type: ollama
    - base_url: http://localhost:11434
      dimension: 768
      model: nomic-embed-text
      name: ollama-nomic
      type: ollama
  llm:
    default: ollama-qwen
    instances:
    - base_url: http://localhost:11434
      model: qwen2.5:7b
      name: ollama-qwen
      type: ollama
  rerank:
    default: flashrank-tiny
    instances:
    - model: ms-marco-TinyBERT-L-2-v2
      name: flashrank-tiny
      type: flashrank
    - model: ms-marco-MiniLM-L-12-v2
      name: flashrank-mini
      type: flashrank
    - model: ms-marco-MultiBERT-L-12
      name: flashrank-multi
      type: flashrank
  vectorstore:
    default: chroma-local
    instances:
    - name: chroma-local
      persist_dir: ./data/chroma
      type: chroma
    - embedding_dimension: 1024
      mode: memory
      name: qdrant-memory
      type: qdrant
    - embedding_dimension: 1024
      mode: local
      name: qdrant-local
      path: ./data/qdrant
      type: qdrant
    - embedding_dimension: 1024
      host: localhost
      mode: remote
      name: qdrant-remote
      port: 6333
      type: qdrant
server:
  debug: true
  host: 0.0.0.0
  port: 8818
watcher:
  debounce_seconds: 1.0
  enabled: true
